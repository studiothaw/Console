<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Console</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

<div id="dashboard">
    <div id="dashboard-inner">
        <input id="doc-title" type="text" placeholder="Untitled" spellcheck="false">
        <button class="dash-btn" id="btn-new">New</button>
        <button class="dash-btn" id="btn-save">Save</button>
        <button class="dash-btn" id="btn-load">Load</button>
        <input type="file" id="file-input" accept=".json" style="display:none">
    </div>
    <div id="dashboard-stats">
    </div>
</div>
<div id="dashboard-toggle">▼</div>

<div id="app"></div>

<script src="script.js"></script>

</body>
</html>
