<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Console</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

<!-- Google Sign-In screen -->
<div id="signin-screen">
    <div id="signin-box">
        <div id="signin-title">Console</div>
        <div id="signin-subtitle">Sign in to continue</div>
        <button id="signin-btn">Sign in with Google</button>
    </div>
</div>

<!-- Main app (hidden until signed in) -->
<div id="main-app" style="display:none">
    <div id="dashboard">
        <div id="dashboard-inner">
            <select id="file-dropdown" title="Select file"></select>
            <span id="unsaved-indicator" title="Unsaved changes">●</span>
            <button class="dash-btn" id="btn-new">New</button>
            <button class="dash-btn" id="btn-save">Save</button>
            <button class="dash-btn" id="btn-refresh">Reload</button>
            <button class="dash-btn" id="btn-signout">Sign Out</button>
        </div>
        <div id="dashboard-stats"></div>
    </div>
    <div id="dashboard-toggle">▼</div>
    <div id="app"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
